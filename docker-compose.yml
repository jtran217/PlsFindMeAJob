services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/jobs.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "6767:6767"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
